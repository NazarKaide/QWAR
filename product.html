<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QWAR — PRODUCT</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f0f0;
            --black: #000;
            --accent: #fa9cc8;
            --border: 2px solid #000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Space Mono', monospace;
            background-color: var(--bg);
            color: var(--black);
            overflow-x: hidden;
        }

        /* Marquee */
        .marquee {
            background: var(--black);
            color: #fff;
            padding: 10px 0;
            overflow: hidden;
            white-space: nowrap;
            border-bottom: var(--border);
        }
        .marquee-inner {
            display: inline-block;
            animation: marquee 20s linear infinite;
            font-family: 'Archivo Black', sans-serif;
            font-size: 1.2rem;
            text-transform: uppercase;
        }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        /* Header */
        header {
            padding: 30px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: var(--border);
        }
        .logo { font-family: 'Archivo Black'; font-size: 2.5rem; text-decoration: none; color: #000; letter-spacing: -2px; }
        .nav-link { text-decoration: none; color: #000; font-weight: 700; border: var(--border); padding: 10px 20px; text-transform: uppercase; transition: 0.3s; }
        .nav-link:hover { background: #000; color: #fff; }

        /* Product Section */
        .product-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 80vh;
            border-bottom: var(--border);
        }
        .product-gallery {
            border-right: var(--border);
            padding: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
        }
        .main-img {
            width: 100%;
            max-width: 500px;
            border: var(--border);
            transition: 0.4s;
        }
        .product-gallery:hover .main-img {
            transform: rotate(-2deg);
            box-shadow: 20px 20px 0px var(--black);
        }

        .product-details {
            padding: 60px 10%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 25px;
        }
        h1 { font-family: 'Archivo Black'; font-size: clamp(2rem, 5vw, 4rem); line-height: 0.8; text-transform: uppercase; }
        .price-tag { display: inline-block; background: var(--black); color: #fff; padding: 10px 20px; font-family: 'Archivo Black'; font-size: 1.5rem; width: fit-content; }
        .description { line-height: 1.6; border-top: var(--border); padding-top: 20px; max-width: 500px; }

        /* Sizes */
        .sizes { display: flex; gap: 10px; margin-top: 10px; }
        .size-btn { width: 50px; height: 50px; border: var(--border); background: #fff; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .size-btn:hover, .size-btn.active { background: var(--black); color: #fff; transform: translate(-2px, -2px); box-shadow: 4px 4px 0px var(--accent); }

        /* Button */
        .add-btn {
            background: var(--accent);
            color: #000;
            border: var(--border);
            padding: 20px;
            font-family: 'Archivo Black';
            font-size: 1.5rem;
            text-align: center;
            text-decoration: none;
            box-shadow: 8px 8px 0px #000;
            transition: 0.3s;
        }
        .add-btn:hover { transform: translate(-4px, -4px); box-shadow: 12px 12px 0px #000; background: #fff; }

        footer { background: #000; color: #fff; padding: 60px 5%; text-align: center; }
        .footer-logo { font-family: 'Archivo Black'; font-size: clamp(4rem, 20vw, 12rem); opacity: 0.1; }

        @media (max-width: 850px) {
            .product-container { grid-template-columns: 1fr; }
            .product-gallery { border-right: none; border-bottom: var(--border); }
        }
    </style>
</head>
<body>

    <div class="marquee">
        <div class="marquee-inner">
            QWAR ARCHIVE 2026 // LIMITED RELEASE // DESIGNED IN UKRAINE // 
        </div>
    </div>

    <header>
        <a href="index.html" class="logo">QWAR</a>
        <nav><a href="index.html#shop" class="nav-link">Shop</a></nav>
    </header>

    <main class="product-container">
        <section class="product-gallery">
            <img src="" alt="Product" class="main-img" id="productImage">
        </section>

        <section class="product-details">
            <div style="font-size: 0.8rem; opacity: 0.5;">#DROP_001</div>
            <h1 id="productTitle">LOADING...</h1>
            <div class="price-tag" id="productPrice">0 UAH</div>
            <div class="description" id="productDesc">...</div>

            <div>
                <p style="font-weight: 700; margin-bottom: 10px;">SELECT_SIZE:</p>
                <div class="sizes">
                    <button class="size-btn">S</button>
                    <button class="size-btn active">M</button>
                    <button class="size-btn">L</button>
                    <button class="size-btn">XL</button>
                </div>
            </div>

            <a href="cart.html" class="add-btn">ADD_TO_BAG</a>
        </section>
    </main>

    <footer><div class="footer-logo">QWAR</div></footer>

    <script>
        const products = {
            '1_1': { title: 'WHO_IS_QWAR_HOODIE', price: '2 900 UAH', img: 'css/1_1.png', desc: 'Класичний худі з першого архіву. 90% бавовна, вільний крій.' },
            '1_2': { title: 'WHO_IS_QWAR_HOODIE_V2', price: '2 900 UAH', img: 'css/1_2.png', desc: 'Друга варіація класичного силуету з оновленими деталями.' },
            '1_3': { title: 'VOID_TECH_WEAR', price: '4 100 UAH', img: 'css/1_3.png', desc: 'Технологічний верхній одяг. Стійкість до вітру та вологи.' },
            '1_4': { title: 'CORE_ARCHIVE_TEE', price: '1 500 UAH', img: 'css/1_4.png', desc: 'Футболка високої щільності. Базовий елемент цифрового архіву.' }
        };

        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        if (id && products[id]) {
            const p = products[id];
            document.getElementById('productTitle').innerText = p.title;
            document.getElementById('productPrice').innerText = p.price;
            document.getElementById('productImage').src = p.img;
            document.getElementById('productDesc').innerText = p.desc;
            document.title = `QWAR — ${p.title}`;
        }

        // Перемикання кнопок розміру
        document.querySelectorAll('.size-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            };
        });
        // Додайте цей код всередині вашого <script> у product.html
        const addToCartBtn = document.querySelector('.add-btn');

        addToCartBtn.onclick = (e) => {
            e.preventDefault();
    
            // Отримуємо ID товару з URL (ми його вже витягли раніше як 'id')
            const params = new URLSearchParams(window.location.search);
            const productId = params.get('id');
    
            if (productId && products[productId]) {
                const productToSave = products[productId];
        // Додаємо ідентифікатор в об'єкт
                productToSave.id = productId; 
        
        // Зберігаємо в LocalStorage
                localStorage.setItem('cartItem', JSON.stringify(productToSave));
        
        // Перенаправляємо в кошик
                window.location.href = 'cart.html';
            }
        };
    </script>
</body>
</html>
